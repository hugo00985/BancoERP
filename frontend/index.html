<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banco Industrial - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.98);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        
        .nav-tabs .nav-link {
            color: #1a472a;
            font-weight: bold;
            border: none;
            padding: 12px 20px;
        }
        
        .nav-tabs .nav-link.active {
            background-color: #1a472a;
            color: white;
            border-radius: 10px;
        }
        
        .nav-tabs .nav-link:hover:not(.active) {
            background-color: #e8f5e9;
            border-radius: 10px;
        }
        
        .access-type {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .access-type .form-check {
            display: inline-block;
            margin-right: 25px;
        }
        
        .codigo-empleado-field {
            background: #fff3cd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .btn-primary {
            background-color: #1a472a;
            border-color: #1a472a;
            padding: 12px;
            font-weight: bold;
        }
        
        .btn-primary:hover {
            background-color: #0d2818;
            border-color: #0d2818;
        }
        
        .btn-success {
            background-color: #2d6a4f;
            border-color: #2d6a4f;
            padding: 12px;
            font-weight: bold;
        }
        
        .btn-success:hover {
            background-color: #1b4d3e;
            border-color: #1b4d3e;
        }
        
        .form-control:focus {
            border-color: #1a472a;
            box-shadow: 0 0 0 0.2rem rgba(26, 71, 42, 0.25);
        }
        
        .forgot-password-link {
            color: #1a472a;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        .forgot-password-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 576px) {
            .login-card {
                margin: 10px;
            }
            
            .access-type .form-check {
                display: block;
                margin-bottom: 10px;
            }
            
            .nav-tabs .nav-link {
                padding: 8px 12px;
                font-size: 14px;
            }
            
            .card-body {
                padding: 20px !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="fas fa-university fa-3x" style="color: #1a472a;"></i>
                    <h2 class="mt-2" style="color: #1a472a;">Banco Industrial</h2>
                    <p class="text-muted">Sistema Bancario</p>
                </div>
                
                <ul class="nav nav-tabs mb-4 justify-content-center" id="authTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">
                            <i class="fas fa-user-plus me-2"></i>Registrarse
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content">
                    <!-- Login Tab -->
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" id="loginUsername" class="form-control" placeholder="Ingresa tu usuario" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="loginPassword" class="form-control" placeholder="Ingresa tu contraseña" required>
                            </div>
                            <div class="access-type">
                                <label class="form-label fw-bold mb-2">Tipo de Acceso:</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="accessType" id="accessCliente" value="cliente" checked>
                                    <label class="form-check-label">👤 Cliente</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="accessType" id="accessCajero" value="cajero">
                                    <label class="form-check-label">👨‍💼 Cajero / Administrador</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Ingresar
                            </button>
                            <div class="text-center mt-3">
                                <a href="#" id="forgotPasswordLink" class="forgot-password-link">
                                    <i class="fas fa-key me-1"></i>¿Olvidaste tu contraseña?
                                </a>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Register Tab -->
                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="regNombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input type="text" id="regUsername" class="form-control" placeholder="Ej: juanperez" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" id="regEmail" class="form-control" placeholder="ejemplo@correo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">DPI</label>
                                <input type="text" id="regDpi" class="form-control" placeholder="Ej: 1234567890101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="regPassword" class="form-control" placeholder="Mínimo 6 caracteres" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" id="regConfirmPassword" class="form-control" placeholder="Repite tu contraseña" required>
                            </div>
                            
                            <div class="access-type">
                                <label class="form-label fw-bold mb-2">Registrarse como:</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="regType" id="regCliente" value="cliente" checked>
                                    <label class="form-check-label">👤 Cliente</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="regType" id="regCajero" value="cajero">
                                    <label class="form-check-label">👨‍💼 Cajero / Administrador</label>
                                </div>
                            </div>
                            
                            <div id="codigoEmpleadoDiv" style="display: none;">
                                <div class="codigo-empleado-field">
                                    <label class="form-label">Código de Empleado</label>
                                    <input type="text" id="codigoEmpleado" class="form-control" placeholder="Ej: EMP0001">
                                    <small class="text-muted">Código único para empleados</small>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 mt-3">
                                <i class="fas fa-user-plus me-2"></i>Registrarse
                            </button>
                        </form>
                    </div>
                </div>
                
                <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
                <div id="registerSuccess" class="alert alert-success mt-3 d-none"></div>
                <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
            </div>
        </div>
    </div>

    <!-- Modal Recuperar Contraseña -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-key me-2"></i>Recuperar Contraseña</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Ingresa tu nombre de usuario y DPI para cambiar tu contraseña.</p>
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre de Usuario</label>
                            <input type="text" id="forgotUsername" class="form-control" placeholder="Ej: juanperez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DPI</label>
                            <input type="text" id="forgotDpi" class="form-control" placeholder="Ej: 1234567890101" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nueva Contraseña</label>
                            <input type="password" id="forgotNewPassword" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar Nueva Contraseña</label>
                            <input type="password" id="forgotConfirmPassword" class="form-control" placeholder="Repite la nueva contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Cambiar Contraseña</button>
                    </form>
                    <div id="forgotPasswordResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
